services:
  senzor-backend:
    container_name: senzor-backend
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      # Container path; do not use host .env here (local dev uses repo-relative paths).
      NETWORK_ALERTS_STORAGE_PATH: /root/data/network_alerts.jsonl
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    volumes:
       - ./backend/data:/root/data
    networks:
      - senzor-net

networks:
  senzor-net:
    driver: bridge